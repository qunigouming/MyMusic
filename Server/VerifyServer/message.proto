syntax = "proto3";

package message;

service VerifyService {
  rpc GetVerifyCode (GetVerifyReq) returns (GetVerifyRsp) {}
}

enum VerifyPurpose {
  REGISTER = 0;
  RESET_PASSWORD = 1;
}

message GetVerifyReq {
  string email = 1;
  VerifyPurpose purpose = 2;
}

message GetVerifyRsp {
  int32 error = 1;
  string email = 2;
  string code = 3;
}
